<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Descrizioni</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .label {
    color: #555;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /*
    La textarea ha ESATTAMENTE la stessa larghezza, font e padding
    della sidebar progetto nel sito (25vw - padding).
    Scrivi qui = quello che vedi nel sito.
  */
  textarea {
    width: calc(25vw - 72px); /* 25% viewport - pl:24px - pr:48px */
    min-height: 70vh;
    background: transparent;
    color: rgba(255,255,255,0.6);
    border: none;
    border-left: 1px solid #222;
    border-right: 1px solid #222;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.625;
    text-align: justify;
    word-spacing: -0.5px;
    resize: none;
    outline: none;
    overflow-wrap: break-word;
  }
  textarea::placeholder { color: #333; }

  .hint {
    color: #444;
    font-size: 11px;
    max-width: calc(25vw - 72px);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="container">
  <div class="label">larghezza colonna sito</div>
  <textarea
    id="editor"
    placeholder="Scrivi qui..."
    spellcheck="true"
    lang="it"
  ></textarea>
  <div class="hint">
    Questa area ha la stessa larghezza della colonna testo nel sito.<br>
    Gli a-capo che metti qui = a-capo nel sito. Poi copia nel file .txt
  </div>
</div>

</body>
</html>
